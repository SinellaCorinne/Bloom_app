name: bloom_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:

  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.5
  provider: ^6.0.5
  image_picker: ^1.0.7
  sqflite: ^2.3.0          # Base de données locale SQL
  path: ^1.8.3             # Pour gérer les chemins de fichiers
  connectivity_plus: ^5.0.2 # Pour détecter le Wi-Fi

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/welcome.png"
  adaptive_icon_background: "#FFE5C6CC"
  adaptive_icon_foreground: "assets/images/welcome.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/